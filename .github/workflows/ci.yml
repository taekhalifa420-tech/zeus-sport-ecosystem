.github/workflows/ci.ymlname: ⚡ Zeus Sport CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: 🧪 Test & Lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    - run: npm ci
    - run: npm run lint
    - run: npm run test

  build-dashboard:
    name: 📱 Build Dashboard
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    - run: npm ci
    - run: npm run build:dashboard
    - uses: actions/upload-artifact@v4
      with:
        name: dashboard-build
        path: apps/dashboard/dist

  deploy:
    name: 🚀 Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [test, build-dashboard]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - uses: actions/download-artifact@v4
      with:
        name: dashboard-build
        path: dist
    - uses: actions/deploy-pages@v4
      id: deploymentname: 📊 Daily Sales Report

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
    - run: npm ci
    - run: node scripts/lazada-sales-tracker.js
      env:
        LAZADA_APP_KEY: ${{ secrets.LAZADA_APP_KEY }}
        LAZADA_APP_SECRET: ${{ secrets.LAZADA_APP_SECRET }}
        LAZADA_ACCESS_TOKEN: ${{ secrets.LAZADA_ACCESS_TOKEN }}
    - uses: actions/github-script@v7
      with:
        script: |
          const date = new Date().toISOString().split('T')[0];
          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: `📊 Daily Sales Report - ${date}`,
            body: `Automated daily sales report for ${date}`,
            labels: ['sales-report', 'automated']
          });
